services:
  proxy2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: proxy2api:local
    container_name: proxy2api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

