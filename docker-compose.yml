services:
  proxy2api:
    build:
      context: .
      dockerfile: Dockerfile
    image: proxy2api:local
    container_name: proxy2api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    container_name: proxy2api-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data

  postgres:
    image: postgres:16-alpine
    container_name: proxy2api-postgres
    restart: unless-stopped
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: proxy2api
      POSTGRES_PASSWORD: proxy2api
      POSTGRES_DB: proxy2api
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  mysql:
    image: mysql:8.4
    container_name: proxy2api-mysql
    restart: unless-stopped
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proxy2api
      MYSQL_USER: proxy2api
      MYSQL_PASSWORD: proxy2api
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
